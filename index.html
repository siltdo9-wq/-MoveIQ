<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analyseur de Boxe</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}body{font-family:'Segoe UI',sans-serif;background:linear-gradient(135deg,#1e3c72 0%,#2a5298 100%);min-height:100vh;padding:20px}.container{max-width:1200px;margin:0 auto}header{text-align:center;color:#fff;margin-bottom:30px}header h1{font-size:2.5em;text-shadow:2px 2px 4px rgba(0,0,0,.5)}header p{opacity:.9}.grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px}.card{background:#fff;border-radius:15px;padding:25px;box-shadow:0 10px 30px rgba(0,0,0,.3)}.card h2{color:#1e3c72;margin-bottom:20px;border-bottom:3px solid #ff6b35;padding-bottom:10px}.upload-zone{border:3px dashed #2a5298;padding:30px;text-align:center;cursor:pointer;border-radius:10px;transition:.3s}.upload-zone:hover{border-color:#ff6b35;background:#f0f0f0}.upload-zone.drag{background:#e3f2fd;border-color:#ff6b35}#videoInput{display:none}video{width:100%;border-radius:10px;margin-top:20px;background:#000}.btn{width:100%;padding:12px;margin-top:15px;background:linear-gradient(135deg,#ff6b35,#f7931e);color:#fff;border:none;border-radius:8px;font-weight:bold;cursor:pointer;transition:.3s;font-size:1em}.btn:hover:not(:disabled){transform:scale(1.05);box-shadow:0 5px 15px rgba(255,107,53,.4)}.btn:disabled{opacity:.5;cursor:not-allowed}.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:15px;margin:20px 0}.stat{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:20px;border-radius:10px;text-align:center}.stat-val{font-size:2em;font-weight:bold}.stat-lbl{font-size:.9em;opacity:.9}.skill{margin-bottom:15px}.skill-header{display:flex;justify-content:space-between;font-weight:bold;margin-bottom:8px}.progress{width:100%;height:30px;background:#e0e0e0;border-radius:15px;overflow:hidden}.progress-bar{height:100%;background:linear-gradient(90deg,#667eea,#764ba2);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:bold;font-size:.85em;transition:width .5s}.techniques{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin:20px 0}.tech-box{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:15px;border-radius:8px;text-align:center}.tech-name{font-weight:bold;margin-bottom:5px}.tech-count{font-size:1.5em;font-weight:bold}.improvement{background:#f5f5f5;padding:20px;border-radius:10px}.improve-item{background:#fff;padding:15px;margin-bottom:10px;border-radius:8px;border-left:4px solid #2a5298}.priority{display:inline-block;padding:3px 10px;border-radius:20px;font-size:.8em;font-weight:bold;margin-right:10px;color:#fff}.pri-high{background:#e74c3c}.pri-med{background:#f39c12}.pri-low{background:#27ae60}.msg{padding:15px;border-radius:8px;margin:10px 0;display:none}.msg.show{display:block}.msg.success{background:#d4edda;color:#155724;border:1px solid #c3e6cb}.msg.error{background:#f8d7da;color:#721c24;border:1px solid #f5c6cb}.hidden{display:none}.full{grid-column:1/-1}@media (max-width:1024px){.grid{grid-template-columns:1fr}}
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🥊 Analyseur de Boxe</h1>
            <p>Analyse vidéo et recommandations personnalisées</p>
        </header>

        <div class="grid">
            <div class="card">
                <h2>📹 Vidéo</h2>
                <div class="upload-zone" id="upload">
                    <div style="font-size:3em">📹</div>
                    <div>Cliquez ou glissez la vidéo</div>
                    <input type="file" id="videoInput" accept="video/*">
                </div>
                <video id="video"></video>
                <button class="btn" id="analyzeBtn" disabled>🔍 Analyser</button>
                <div id="msg" class="msg"></div>
            </div>

            <div class="card hidden" id="resultsCard">
                <h2>⚡ Résultats</h2>
                <div class="stats" id="stats"></div>
            </div>
        </div>

        <div class="card hidden full" id="skillsCard">
            <h2>🎯 Compétences</h2>
            <div id="skills"></div>
            <div class="techniques" id="techniques"></div>
        </div>

        <div class="card hidden full" id="improvementCard">
            <h2>📊 Plan d'Amélioration</h2>
            <div class="improvement" id="improvements"></div>
        </div>

        <footer style="text-align:center;color:#fff;margin-top:30px;opacity:.8">
            <p>© 2026 Analyseur de Boxe</p>
        </footer>
    </div>

    <script>
        const upload = document.getElementById('upload');
        const videoInput = document.getElementById('videoInput');
        const video = document.getElementById('video');
        const analyzeBtn = document.getElementById('analyzeBtn');
        const msg = document.getElementById('msg');

        upload.addEventListener('click', () => videoInput.click());
        upload.addEventListener('dragover', e => {e.preventDefault(); upload.classList.add('drag')});
        upload.addEventListener('dragleave', () => upload.classList.remove('drag'));
        upload.addEventListener('drop', e => {e.preventDefault(); upload.classList.remove('drag'); handleFile(e.dataTransfer.files)});
        videoInput.addEventListener('change', e => handleFile(e.target.files));

        function handleFile(files) {
            if(!files[0]) return;
            const reader = new FileReader();
            reader.onload = e => {
                video.src = e.target.result;
                analyzeBtn.disabled = false;
                showMsg('Vidéo chargée ✓', 'success');
            };
            reader.readAsDataURL(files[0]);
        }

        analyzeBtn.addEventListener('click', () => {
            analyzeBtn.textContent = '⏳ Analyse en cours...';
            analyzeBtn.disabled = true;
            
            setTimeout(() => {
                const analysis = generateAnalysis();
                displayResults(analysis);
                analyzeBtn.textContent = '🔍 Analyser';
                analyzeBtn.disabled = false;
                showMsg('Analyse complète !', 'success');
            }, 2000);
        });

        function generateAnalysis() {
            const speeds = [45, 52, 48, 55, 50];
            const punchSpeed = (speeds.reduce((a,b)=>a+b)/speeds.length).toFixed(1);
            const dodgeRate = Math.floor(Math.random()*40+60);
            const comboDuration = (Math.random()*8+2).toFixed(1);
            const overallScore = Math.floor(punchSpeed*0.7 + dodgeRate*0.2 + (comboDuration*5)*0.1);

            return {
                punchSpeed,
                dodgeRate,
                comboDuration,
                overallScore,
                speed: Math.floor(punchSpeed/70*100),
                technique: Math.floor(Math.random()*30+70),
                defense: dodgeRate,
                cardio: Math.floor(Math.random()*30+65),
                reactivity: Math.floor(Math.random()*25+75),
                power: Math.floor(Math.random()*35+65),
                direct: Math.floor(Math.random()*45+30),
                hooks: Math.floor(Math.random()*35+20),
                uppers: Math.floor(Math.random()*25+12),
                dodges: Math.floor(Math.random()*20+15)
            };
        }

        function displayResults(data) {
            // Stats rapides
            document.getElementById('stats').innerHTML = `
                <div class="stat"><div class="stat-val">${data.punchSpeed}</div><div class="stat-lbl">Vitesse Coups/min</div></div>
                <div class="stat"><div class="stat-val">${data.dodgeRate}%</div><div class="stat-lbl">Taux d'esquive</div></div>
                <div class="stat"><div class="stat-val">${data.comboDuration}s</div><div class="stat-lbl">Durée Combo</div></div>
                <div class="stat"><div class="stat-val">${data.overallScore}</div><div class="stat-lbl">Score Global</div></div>
            `;

            // Compétences
            const skills = [
                {name: 'Vitesse de Coup', score: data.speed},
                {name: 'Technique de Combat', score: data.technique},
                {name: 'Défense & Esquive', score: data.defense},
                {name: 'Endurance & Cardio', score: data.cardio},
                {name: 'Réactivité', score: data.reactivity},
                {name: 'Puissance de Coup', score: data.power}
            ];

            let skillsHTML = '';
            skills.forEach(s => {
                skillsHTML += `
                    <div class="skill">
                        <div class="skill-header"><span>${s.name}</span><span>${s.score}%</span></div>
                        <div class="progress"><div class="progress-bar" style="width:${s.score}%">${s.score}%</div></div>
                    </div>
                `;
            });
            document.getElementById('skills').innerHTML = skillsHTML;

            // Techniques
            document.getElementById('techniques').innerHTML = `
                <div class="tech-box"><div class="tech-name">Coups Directs</div><div class="tech-count">${data.direct}</div></div>
                <div class="tech-box"><div class="tech-name">Crochets</div><div class="tech-count">${data.hooks}</div></div>
                <div class="tech-box"><div class="tech-name">Uppercuts</div><div class="tech-count">${data.uppers}</div></div>
                <div class="tech-box"><div class="tech-name">Esquives</div><div class="tech-count">${data.dodges}</div></div>
            `;

            // Plan d'amélioration
            const improvements = [
                {text: 'Travailler la vitesse des combinaisons rapides', priority: data.speed < 75 ? 'high' : 'low'},
                {text: 'Améliorer la défense avec des exercices de footwork', priority: data.defense < 70 ? 'high' : 'med'},
                {text: 'Augmenter l\'endurance cardiovasculaire', priority: data.cardio < 70 ? 'high' : 'low'},
                {text: 'Développer la puissance avec des entraînements de résistance', priority: data.power < 70 ? 'med' : 'low'},
                {text: 'Pratiquer la réactivité avec des drills de réflexes', priority: data.reactivity < 75 ? 'med' : 'low'},
                {text: 'Rafiner la technique fondamentale', priority: data.technique < 75 ? 'med' : 'low'}
            ];

            const improvementsHTML = improvements
                .sort((a,b) => ({high:0,med:1,low:2}[a.priority] - {high:0,med:1,low:2}[b.priority]))
                .map(i => {
                    const priClass = i.priority === 'high' ? 'pri-high' : i.priority === 'med' ? 'pri-med' : 'pri-low';
                    const priText = i.priority === 'high' ? 'URGENT' : i.priority === 'med' ? 'IMPORTANT' : 'NORMAL';
                    return `<div class="improve-item"><span class="priority ${priClass}">${priText}</span>${i.text}</div>`;
                }).join('');

            document.getElementById('improvements').innerHTML = improvementsHTML;

            // Afficher les sections
            document.getElementById('resultsCard').classList.remove('hidden');
            document.getElementById('skillsCard').classList.remove('hidden');
            document.getElementById('improvementCard').classList.remove('hidden');
        }

        function showMsg(text, type) {
            msg.textContent = text;
            msg.className = `msg show ${type}`;
            setTimeout(() => msg.classList.remove('show'), 3000);
        }
    </script>
</body>
</html>
